version: 2

project_name: FusionDataCLI

before:
  hooks:
    - go mod tidy

builds:
  - id: fusiondatacli
    main: .
    binary: fusiondatacli
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X github.com/schneik80/FusionDataCLI/config.DefaultClientID={{ .Env.APS_CLIENT_ID }}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: fusiondatacli
    name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: schneik80
    name: FusionDataCLI
  name_template: "v{{ .Version }}"
  draft: false
  prerelease: auto
  footer: |
    ## Install

    **Homebrew (macOS / Linux)**
    ```
    brew install schneik80/fusiondatacli/fusiondatacli
    ```

    **macOS (Apple Silicon)**
    ```
    curl -L https://github.com/schneik80/FusionDataCLI/releases/download/v{{ .Version }}/FusionDataCLI-{{ .Version }}-darwin-arm64.tar.gz | tar xz
    sudo mv fusiondatacli /usr/local/bin/
    ```

    **macOS (Intel)**
    ```
    curl -L https://github.com/schneik80/FusionDataCLI/releases/download/v{{ .Version }}/FusionDataCLI-{{ .Version }}-darwin-amd64.tar.gz | tar xz
    sudo mv fusiondatacli /usr/local/bin/
    ```

    **Linux**
    ```
    curl -L https://github.com/schneik80/FusionDataCLI/releases/download/v{{ .Version }}/FusionDataCLI-{{ .Version }}-linux-amd64.tar.gz | tar xz
    sudo mv fusiondatacli /usr/local/bin/
    ```
